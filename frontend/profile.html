<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | AI Genius</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #09090b; --card-bg: #121215; --accent: #8b5cf6; --text: #f8fafc; --text-muted: #94a3b8; --border: #27272a;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar { width: 280px; border-right: 1px solid var(--border); background: var(--card-bg); padding: 32px 24px; display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; }
    .brand { font-size: 1.6rem; font-weight: 800; margin-bottom: 48px; color: var(--accent); }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 14px; color: var(--text-muted); text-decoration: none; margin-bottom: 8px; transition: 0.2s; font-weight: 600; }
    .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.03); color: var(--text); }
    .nav-item.active { background: rgba(139, 92, 246, 0.1); color: var(--accent); }

    /* Main Area */
    .main { flex: 1; padding: 48px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    h1 { font-size: 2.2rem; font-weight: 800; }

    .user-profile { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 8px 20px; border-radius: 100px; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #3b82f6); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 800; }

    /* Grid */
    .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 40px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 28px; transition: 0.3s; }
    .card:hover { transform: translateY(-5px); border-color: var(--accent); }
    .stat-val { font-size: 2.5rem; font-weight: 800; color: var(--accent); }
    .stat-lbl { color: var(--text-muted); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; margin-top: 4px; }

    /* Sections */
    .section-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
    .section-title span { width: 12px; height: 12px; background: var(--accent); border-radius: 3px; }

    .ai-rec-box { background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), transparent); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 24px; padding: 24px; display: flex; gap: 20px; align-items: center; margin-bottom: 40px; }
    
    .chart-panel { grid-column: span 2; }
    #skillsChart { max-height: 250px; }

    .course-strip { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 18px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .progress-bar { width: 120px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 100px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); }

    #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  </style>
</head>
<body>
  <div id="loader"><div style="width:40px; height:40px; border:4px solid rgba(139,92,246,0.1); border-top-color:#8b5cf6; border-radius:50%; animation: spin 1s linear infinite;"></div></div>

  <aside class="sidebar">
    <div class="brand">🎓 AI GENIUS</div>
    <a href="#" class="nav-item active">📊 Dashboard</a>
    <a href="courses.html" class="nav-item">📚 Courses</a>
    <a href="login.html" class="nav-item" style="margin-top: auto; color: #ef4444;" onclick="localStorage.clear()">🚪 Logout</a>
  </aside>

  <main class="main">
    <div class="header">
      <h1>Dashboard</h1>
      <div class="user-profile">
        <div class="avatar" id="avatarTxt">U</div>
        <div style="text-align: left;">
          <div style="font-weight: 800; font-size: 0.9rem;" id="userName">Student</div>
          <div style="font-size: 0.75rem; color: var(--text-muted);" id="userEmail">email@example.com</div>
        </div>
      </div>
    </div>

    <div class="dash-grid">
      <div class="card">
        <div class="stat-val" id="streakVal">0</div>
        <div class="stat-lbl">Day Streak</div>
      </div>
      <div class="card">
        <div class="stat-val" id="progVal">0%</div>
        <div class="stat-lbl">Overall Progress</div>
      </div>
      <div class="card">
        <div class="stat-val" id="courseCount">6</div>
        <div class="stat-lbl">Active Pathways</div>
      </div>
    </div>

    <div class="section-title"><span></span> AI RECOMMENDATION</div>
    <div class="ai-rec-box">
      <div style="font-size: 2.5rem;">🔮</div>
      <div>
        <strong id="aiRecTitle">Analyzing Performance...</strong>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;" id="aiRecMsg">Loading your personalized learning path based on recent activity.</p>
      </div>
    </div>

    <div class="dash-grid">
      <div class="card chart-panel">
        <div class="section-title" style="margin-bottom:10px">PROFICIENCY MAP</div>
        <canvas id="skillsChart"></canvas>
      </div>
      <div class="card">
        <div class="section-title" style="margin-bottom:10px">ENROLLED</div>
        <div id="enrolledList"></div>
      </div>
    </div>
  </main>

  <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
  <script src="utils.js"></script>
  <script src="chatbot.js"></script>
  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = 'login.html';

    async function init() {
      // Identity
      document.getElementById('userName').innerText = user.name || 'Student';
      document.getElementById('userEmail').innerText = user.email || '';
      document.getElementById('avatarTxt').innerText = user.name ? user.name[0] : 'S';

      try {
        const res = await window.aiFetch('/api/dashboard');
        const data = await res.json();
        console.log("Dash Data:", data);

        document.getElementById('streakVal').innerText = data.streak;
        document.getElementById('progVal').innerText = data.progress + "%";
        
        // AI Rec
        const rec = data.strongSubjects.length > 0 ? data.strongSubjects[0] : 'DSA';
        document.getElementById('aiRecTitle').innerText = "Focus on " + rec.toUpperCase();
        document.getElementById('aiRecMsg').innerText = "Based on your current aptitude score, we suggest mastering " + rec + " advanced concepts next.";

        // Charts & Courses
        renderSkillsChart(data.scores);
        renderEnrolled(data.scores);

      } catch (e) {
        console.error("Dashboard failed to sync with backend.");
      } finally {
        setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
      }
    }

    function renderEnrolled(scores) {
      const list = document.getElementById('enrolledList');
      const courses = Object.keys(scores);
      list.innerHTML = '';
      courses.slice(0, 4).forEach(c => {
        const s = scores[c] || 0;
        list.innerHTML += `
          <div class="course-strip">
            <div style="font-weight:700; font-size:0.85rem">${c.toUpperCase()}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${s}%"></div></div>
          </div>
        `;
      });
    }

    function renderSkillsChart(scores) {
      new Chart(document.getElementById('skillsChart'), {
        type: 'radar',
        data: {
          labels: ['DSA', 'ML', 'APTITUDE', 'SYS DESIGN', 'DBMS', 'OS'],
          datasets: [{
            label: 'Level',
            data: [scores.dsa||0, scores.machine_learning||0, scores.aptitude||0, scores.system_design||0, scores.dbms||0, scores.operating_systems||0],
            backgroundColor: 'rgba(139, 92, 246, 0.2)', borderColor: '#8b5cf6', borderWidth: 2, pointBackgroundColor: '#8b5cf6'
          }]
        },
        options: {
          scales: { r: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.05)' }, pointLabels: { color: '#94a3b8', font: { weight: '800' } } } },
          plugins: { legend: { display: false } }
        }
      });
    }

    init();
  </script>
</body>
</html>
