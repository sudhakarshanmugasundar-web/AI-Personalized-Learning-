<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathway | AI Genius</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0a0a0c;
      color: #fff;
      min-height: 100vh;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stepper {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
      position: relative;
    }

    .stepper::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      z-index: 0;
    }

    .step {
      position: relative;
      z-index: 1;
      flex: 1;
      text-align: center;
      font-size: 0.65rem;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.2);
      text-transform: uppercase;
      padding-top: 35px;
    }

    .step::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #1a1a1f;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .step.active {
      color: #8b5cf6;
    }

    .step.active::after {
      border-color: #8b5cf6;
      background: #8b5cf6;
    }

    .card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 40px;
      width: 100%;
      max-width: 900px;
      min-height: 550px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(20px);
    }

    .phase {
      display: none;
      animation: fadeIn 0.4s ease;
      flex: 1;
    }

    .phase.active {
      display: flex;
      flex-direction: column;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .txt {
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      margin-bottom: 24px;
      font-size: 1.05rem;
    }

    /* MCQ */
    .opt {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 600;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .opt:hover {
      background: rgba(139, 92, 246, 0.05);
      border-color: #8b5cf6;
    }

    .opt.correct {
      background: rgba(34, 197, 94, 0.1);
      border-color: #22c55e;
      color: #4ade80;
    }

    .opt.wrong {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
      color: #f87171;
    }

    /* Code Editor Area */
    .ide-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    select {
      background: #1a1a1f;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      outline: none;
    }

    .editor-container {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    textarea {
      width: 100%;
      height: 280px;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Fira Code', monospace;
      padding: 20px;
      border: none;
      outline: none;
      resize: none;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 15px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      border: none;
      font-size: 0.85rem;
    }

    .btn-outline {
      background: #1a1a1f;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .btn-primary {
      background: #8b5cf6;
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(139, 92, 246, 0.2);
    }

    .btn-submit {
      background: #10b981;
      color: #fff;
    }

    .btn-submit:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .console {
      margin-top: 20px;
      background: #000;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-family: monospace;
      font-size: 0.85rem;
      color: #94a3b8;
      min-height: 80px;
    }

    .console b {
      color: #8b5cf6;
    }

    .out-msg {
      margin-top: 8px;
      font-weight: 700;
    }

    .out-succ {
      color: #10b981;
    }

    .out-err {
      color: #ef4444;
    }

    #nextBtn {
      margin-top: auto;
      align-self: flex-end;
    }
  </style>
</head>

<body>

  <div class="stepper">
    <div class="step active" id="s1">Theory</div>
    <div class="step" id="s2">Practice</div>
    <div class="step" id="s3">Coding</div>
    <div class="step" id="s4">Analysis</div>
  </div>

  <div class="card">
    <!-- Phase 1: Teach -->
    <div class="phase active" id="p1">
      <h2 id="tTitle">Loading...</h2>
      <p class="txt" id="tExp"></p>
      <div
        style="background:rgba(255,255,255,0.03); padding:20px; border-radius:14px; border:1px solid rgba(255,255,255,0.05);">
        <code id="tCode" style="font-family:monospace; color:#8b5cf6;"></code>
      </div>
    </div>

    <!-- Phase 2: MCQ -->
    <div class="phase" id="p2">
      <div id="mCount" style="color:#8b5cf6; font-size:0.7rem; font-weight:800; margin-bottom:10px;">QUESTION 1/3</div>
      <h2 id="mText">...</h2>
      <div id="mOpts" style="margin-top:20px;"></div>
    </div>

    <!-- Phase 3: Coding -->
    <div class="phase" id="p3">
      <div class="ide-header">
        <h2 id="cTitle">Problem</h2>
        <select id="langSel" onchange="updateTemplate()">
          <option value="java">Java</option>
          <option value="python">Python</option>
          <option value="c">C</option>
          <option value="cpp">C++</option>
        </select>
      </div>
      <p class="txt" id="cGoal" style="margin-bottom:15px;"></p>

      <div class="editor-container">
        <textarea id="editor" spellcheck="false"></textarea>
      </div>

      <div class="controls">
        <button class="btn btn-outline" onclick="compileCode()">Compile</button>
        <button class="btn btn-outline" onclick="runCode()">Run</button>
        <button class="btn btn-primary btn-submit" id="submitBtn" disabled onclick="submitCode()">Submit
          Solution</button>
      </div>

      <div class="console" id="con">
        <b>Console:</b>
        <div id="conOut" style="margin-top:5px;">Ready to compile...</div>
        <div id="testRes" class="out-msg"></div>
      </div>
    </div>

    <!-- Phase 4: Result -->
    <div class="phase" id="p4" style="text-align:center; justify-content:center;">
      <div style="font-size:4.5rem; font-weight:900; color:#8b5cf6;" id="resScore">0%</div>
      <h3 style="font-size:1.6rem; margin:15px 0;" id="resTitle">Evaluation: Learner</h3>
      <p id="resMsg" style="color:rgba(255,255,255,0.4); max-width:500px; margin:0 auto;"></p>
      <button class="btn btn-primary" style="margin-top:30px;" onclick="finishLevel()">Finish & Continue →</button>
    </div>

    <button id="nextBtn" class="btn btn-primary" onclick="nextPhase()">Start Practice →</button>
  </div>

  <script src="utils.js"></script>
  <script>
    console.log("Quiz JS Loaded");

    const params = new URLSearchParams(window.location.search);
    const course = params.get('course') || 'java';
    const level = params.get('level') || '1';

    let data = null;
    let phase = 1;
    let score = 0;
    let currentQ = 0;
    let currentCodeQ = 0;
    let codePassed = false;

    // ================= INIT =================
    async function init() {
      try {
        const res = await fetch(`http://localhost:5001/api/module?course=${course}&level=${level}`);
        data = await res.json();

        document.getElementById('tTitle').innerText = data.teach.title;
        document.getElementById('tExp').innerText = data.teach.explanation;
        document.getElementById('tCode').innerText = data.teach.exampleCode;

        updateTemplate();
      } catch (err) {
        console.error("INIT ERROR:", err);
        document.getElementById('tTitle').innerText = "Failed to load content";
      }
    }

    // ================= TEMPLATE =================
    function updateTemplate() {
      if (!data) return;
      const lang = document.getElementById('langSel').value;
      const editor = document.getElementById('editor');
      editor.value = "";
      editor.placeholder = "// Write your " + lang.toUpperCase() + " code here...";
    }

    // ================= PHASE =================
    function nextPhase() {
      if (phase >= 4) return;
      phase++;
      renderPhase();
    }

    function renderPhase() {
      document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));

      document.getElementById(`p${phase}`).classList.add('active');
      document.getElementById(`s${phase}`).classList.add('active');

      const btn = document.getElementById('nextBtn');

      if (phase === 2) {
        loadMCQ();
        btn.style.display = 'none';
      }
      if (phase === 3) {
        loadCoding();
        btn.style.display = 'none';
      }
      if (phase === 4) {
        btn.style.display = 'none';
      }
    }

    // ================= MCQ =================
    function loadMCQ() {
      const q = data.practice[currentQ];

      document.getElementById('mCount').innerText =
        `QUESTION ${currentQ + 1}/${data.practice.length}`;
      document.getElementById('mText').innerText = q.question;

      const list = document.getElementById('mOpts');
      list.innerHTML = '';

      q.options.forEach((opt, idx) => {
        const div = document.createElement('div');
        div.className = 'opt';
        div.innerText = opt;

        div.onclick = () => {
          const all = list.querySelectorAll('.opt');
          all.forEach(d => d.style.pointerEvents = 'none');

          if (idx === q.correctIndex) {
            div.classList.add('correct');
            score += 15;
          } else {
            div.classList.add('wrong');
            all[q.correctIndex].classList.add('correct');
          }

          setTimeout(() => {
            if (currentQ < data.practice.length - 1) {
              currentQ++;
              loadMCQ();
            } else {
              nextPhase();
            }
          }, 1200);
        };

        list.appendChild(div);
      });
    }

    // ================= CODING =================
    function loadCoding() {
      const q = data.coding[currentCodeQ];

      document.getElementById('cTitle').innerText = q.title;
      document.getElementById('cGoal').innerText = q.question;

      document.getElementById('conOut').innerText = "Ready to compile...";
      document.getElementById('testRes').innerText = "";
      document.getElementById('submitBtn').disabled = true;

      document.getElementById('editor').value = "";
      codePassed = false;
    }

    // ================= COMPILE =================
    function compileCode() {
      const editor = document.getElementById('editor').value;
      const out = document.getElementById('conOut');
      const res = document.getElementById('testRes');

      out.innerText = "Compiling...";

      setTimeout(() => {
        if (editor.length < 10) {
          out.innerText = "❌ Code too short";
          res.innerText = "Compilation Failed";
          res.className = "out-msg out-err";
        } else {
          out.innerText = "✅ Compilation Success";
          res.innerText = "Compiled";
          res.className = "out-msg out-succ";
        }
      }, 1000);
    }

    // ================= RUN =================
    async function runCode() {
      const code = document.getElementById('editor').value;
      const language = document.getElementById('langSel').value;

      const out = document.getElementById('conOut');
      const res = document.getElementById('testRes');
      const sBtn = document.getElementById('submitBtn');

      if (!code || code.length < 5) {
        out.innerText = "❌ Write code first";
        return;
      }

      out.innerText = "⏳ Running...";
      res.innerText = "";
      sBtn.disabled = true;

      try {
        const response = await fetch("http://localhost:5001/run-code", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ code, language })
        });

        if (!response.ok) {
          throw new Error("Server not responding");
        }

        const result = await response.json();

        out.innerText = "Output: " + result.output;

        if (result.success) {
          res.innerText = "✅ Passed";
          res.className = "out-msg out-succ";
          sBtn.disabled = false;
          codePassed = true;
        } else {
          res.innerText = "❌ Failed";
          res.className = "out-msg out-err";
          codePassed = false;
        }

      } catch (err) {
        console.error(err);
        out.innerText = "❌ Server Error";
        res.innerText = "Check backend";
        res.className = "out-msg out-err";
      }
    }

    // ================= SUBMIT =================
    function submitCode() {
      if (!codePassed) return;

      const out = document.getElementById('conOut');
      out.innerText = "Checking final results...";

      setTimeout(() => {
        score += 25;

        if (currentCodeQ < data.coding.length - 1) {
          currentCodeQ++;
          loadCoding();
        } else {
          nextPhase();
          calculateResult();
        }
      }, 1000);
    }

    // ================= RESULT =================
    function calculateResult() {
      const pct = Math.min(100, score);
      
      const courseKey = course.toLowerCase();
      document.getElementById('resScore').innerText = pct + "%";

      let title = "Beginner";
      let msg = "Start with basics.";

      if (pct >= 80) {
        title = "Expert";
        msg = "Excellent! Level Mastery Achieved.";
        
        console.log("Saving Mapping:", `${courseKey}_level_${level}`);
        localStorage.setItem(`${courseKey}_level_${level}`, "completed");
      } else if (pct > 50) {
        title = "Intermediate";
        msg = "Good progress! Keep practicing.";
      }

      document.getElementById('resTitle').innerText = "Evaluation: " + title;
      document.getElementById('resMsg').innerText = msg;
    }

    function finishLevel() {
      window.location.href = `levels.html?course=${course.toLowerCase()}`;
    }

    init();
  </script>
</body>

</html>
