<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Strategy | AI Genius</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0c; color: #fff; min-height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
    
    .header { width: 100%; max-width: 800px; display: flex; justify-content: space-between; margin-bottom: 40px; }
    .header a { color: rgba(255,255,255,0.4); text-decoration: none; font-weight: 700; font-size: 0.9rem; transition: 0.3s; }
    .header a:hover { color: #8b5cf6; }

    .ai-strategy { width: 100%; max-width: 800px; background: rgba(139, 92, 246, 0.05); border: 1px solid rgba(139, 92, 246, 0.2); padding: 24px; border-radius: 24px; display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
    .rec-badge { background: #8b5cf6; padding: 4px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; display: inline-block; }

    .level-list { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }
    .level-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 30px; border-radius: 28px;
      display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: inherit; transition: 0.3s;
    }
    .level-card:hover { transform: scale(1.02); border-color: #8b5cf6; background: rgba(139, 92, 246, 0.04); }
    .level-card.locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

    .lvl-info h3 { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
    .lvl-info p { color: rgba(255,255,255,0.4); font-size: 0.9rem; }

    .status-pill { padding: 10px 20px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    .completed { background: rgba(34, 197, 94, 0.1); color: #4ade80; border-color: rgba(34,197,94,0.2); }
  </style>
</head>
<body>

  <div class="header">
    <a href="courses.html">← Back to Catalog</a>
    <h2 id="courseName" style="text-transform: uppercase; letter-spacing: 2px; font-size: 1rem;">Course Levels</h2>
  </div>

  <div class="ai-strategy">
    <div style="font-size: 2rem;">⚡</div>
    <div>
      <div class="rec-badge">AI PATHFINDER ACTIVE</div>
      <p id="aiMsg" style="font-size: 0.95rem; font-weight: 600;">Based on your current proficiency, Level 1 is optimized for your growth.</p>
    </div>
  </div>

  <div class="level-list" id="levelContainer">
    <!-- Levels generated here -->
  </div>

  <script src="utils.js"></script>
  <script>
    const courseParam = new URLSearchParams(window.location.search).get('course') || 'dsa';
    const course = courseParam.toLowerCase();
    
    document.getElementById('courseName').innerText = course.replace('_', ' ');

    function loadLevels() {
      const container = document.getElementById('levelContainer');
      
      const levels = [
        { id: 1, name: "Fundamentals", desc: "Foundational theory and core implementation patterns.", icon: "🔥" },
        { id: 2, name: "Intermediate", desc: "Case studies, logic intensification, and optimization.", icon: "⚡" },
        { id: 3, name: "Advanced Mastery", desc: "Expert-level architecture and complex solving.", icon: "🚀" }
      ];

      container.innerHTML = '';
      
      levels.forEach(l => {
        const isDone = localStorage.getItem(`${course}_level_${l.id}`) === "completed";
        let status = "locked";
        
        console.log(`Checking Progress for ${course} Level ${l.id}:`, isDone ? "COMPLETED" : "NOT DONE");

        // Progression Logic
        if (l.id === 1) {
            status = isDone ? "completed" : "unlocked";
        } else {
          const prevDone = localStorage.getItem(`${course}_level_${l.id - 1}`) === "completed";
          if (prevDone) {
              status = isDone ? "completed" : "unlocked";
          } else {
              status = "locked";
          }
        }

        const card = document.createElement('a');
        card.className = `level-card ${status === 'locked' ? 'locked' : ''}`;
        
        if (status === 'completed') {
            card.href = "javascript:void(0)";
            card.style.cursor = "default";
            card.style.opacity = "0.8";
        } else if (status === 'locked') {
            card.href = "javascript:void(0)";
        } else {
            card.href = `quiz.html?course=${course}&level=${l.id}`;
        }
        
        card.innerHTML = `
          <div style="display:flex; gap:24px; align-items:center;">
            <div style="font-size:2rem">${l.icon}</div>
            <div class="lvl-info">
              <h3>Level ${l.id}: ${l.name}</h3>
              <p>${l.desc}</p>
            </div>
          </div>
          <div class="status-pill ${status === 'completed' ? 'completed' : ''}">
            ${status === 'completed' ? '✅ COMPLETED' : (status === 'locked' ? '🔒 LOCKED' : '🔓 START')}
          </div>
        `;
        container.appendChild(card);
      });

      // Update AI Insights
      const aiMsg = document.getElementById('aiMsg');
      const l1 = localStorage.getItem(`${course}_level_1`) === "completed";
      const l2 = localStorage.getItem(`${course}_level_2`) === "completed";
      
      if (l1 && l2) aiMsg.innerText = "Exceptional progress! You've unlocked Mastery. Focus on high-level architecture.";
      else if (l1) aiMsg.innerText = "L1 complete. Proceed to Intermediate to deepen your logical structures.";
      else aiMsg.innerText = "Begin with Fundamentals. Our analysis shows this is the optimal starting point for you.";
    }

    loadLevels();
  </script>
</body>
</html>
