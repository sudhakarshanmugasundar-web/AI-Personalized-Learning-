<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Levels – AI Personalized Learning</title>
  <meta name="description" content="Select your level.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-grad: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #1a1a3e 100%);
      --accent: #6c63ff;
      --accent-light: #8b85ff;
      --sky: #38bdf8;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.11);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.55);
      --locked: rgba(255,255,255,0.03);
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: var(--bg-grad);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; }
    .orb-1 { width: 400px; height: 400px; top: -100px; left: -100px; background: rgba(108,99,255,0.2); }
    .orb-2 { width: 300px; height: 300px; bottom: 0; right: 0; background: rgba(56,189,248,0.15); }

    .page-header {
      width: 100%; max-width: 800px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; margin-top: 20px; position: relative; z-index: 1;
    }
    .page-header a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.875rem; }
    .page-header a:hover { color: var(--text); }

    .header-text { text-align: center; margin-bottom: 40px; position: relative; z-index: 1; }
    .header-text h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
    .header-text p { color: var(--text-muted); }

    .levels-container {
      width: 100%; max-width: 800px;
      display: flex; flex-direction: column; gap: 16px;
      position: relative; z-index: 1;
    }

    .level-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px 28px;
      display: flex; align-items: center; justify-content: space-between;
      text-decoration: none; color: var(--text);
      transition: transform 0.2s, background 0.2s, border-color 0.2s;
    }
    .level-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.09); border-color: rgba(108,99,255,0.4); }

    .level-info { display: flex; align-items: center; gap: 20px; }
    .level-num {
      width: 50px; height: 50px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--sky));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 800;
    }
    .level-text h2 { font-size: 1.2rem; margin-bottom: 4px; }
    .level-text p { font-size: 0.9rem; color: var(--text-muted); }

    .status-badge {
      padding: 8px 16px; border-radius: 100px; font-size: 0.85rem; font-weight: 600;
    }
    .status-unlocked { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }

    .level-card.locked {
      background: var(--locked); opacity: 0.7; cursor: not-allowed; pointer-events: none;
    }
    .level-card.locked .level-num { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }
    .level-card.locked .status-badge { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1); }

  </style>
</head>

<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="page-header">
    <a href="courses.html">← Back to Courses</a>
    <a href="profile.html" style="text-decoration:none;">
      <div class="user-badge" style="display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.08); border:1px solid var(--card-border); border-radius:100px; padding:6px 14px; font-size:0.8rem; color:var(--text-muted);">
        <span>👤</span>
        <span id="userName">Student</span>
      </div>
    </a>
  </div>

  <div class="header-text">
    <h1 id="courseTitle">Course Levels</h1>
    <p>Complete a level to unlock the next one.</p>
  </div>

  <div class="levels-container" id="levelsContainer">
    <!-- Populated via JS -->
  </div>

  <script>
    const BACKEND = 'http://localhost:8080';
    const user = localStorage.getItem('ailearn_user') || 'Student';
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('course') || 'java';

    const courseNames = {
      'english': '🗣️ Spoken English',
      'java': '☕ Java Programming',
      'python': '🐍 Python Programming'
    };
    
    document.getElementById('courseTitle').textContent = courseNames[courseId];

    const levelTitles = {
      'english': ['Reading Practice', 'Fill in the Blanks', 'Listening & Repeating', 'Topic Speaking', 'Interview Practice'],
      'java': ['Input/Output', 'Variables', 'Data Types', 'Strings', 'Loops (for, while)', 'Arrays', 'Object-Oriented Programming'],
      'python': ['Basics', 'Input/Output', 'Loops', 'Lists', 'Functions', 'Object-Oriented Programming']
    };

    async function loadLevels() {
      let unlockedLevel = 1;
      try {
        const res = await fetch(`${BACKEND}/api/progress?user=${user}&course=${courseId}`);
        const data = await res.json();
        unlockedLevel = data.unlockedLevel || 1;
      } catch (err) {
        console.error("Backend offline, defaulting to Level 1 unlocked");
      }

      const container = document.getElementById('levelsContainer');
      const titles = levelTitles[courseId] || levelTitles['java'];

      for (let i = 1; i <= titles.length; i++) {
        const isLocked = i > unlockedLevel;
        const cardClass = isLocked ? 'level-card locked' : 'level-card';
        const badgeClass = isLocked ? 'status-badge' : 'status-badge status-unlocked';
        const badgeText = isLocked ? '🔒 Locked' : '✅ Unlocked';

        const card = document.createElement('a');
        card.href = isLocked ? '#' : `quiz.html?course=${courseId}&level=${i}`;
        card.className = cardClass;
        card.innerHTML = `
          <div class="level-info">
            <div class="level-num">L${i}</div>
            <div class="level-text">
              <h2>${titles[i-1]}</h2>
              <p>Test your knowledge and progress</p>
            </div>
          </div>
          <div class="${badgeClass}">${badgeText}</div>
        `;
        container.appendChild(card);
      }
    }

    loadLevels();
  </script>
  <script src="chatbot.js"></script>
</body>
</html>
