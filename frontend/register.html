<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – AI Personalized Learning</title>
  <meta name="description" content="Create a new account on the AI Learning Platform.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-grad: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #1a1a3e 100%);
      --accent: #6c63ff;
      --accent-light: #8b85ff;
      --accent-dark: #5a52e0;
      --sky: #38bdf8;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.55);
      --input-bg: rgba(255,255,255,0.08);
      --input-border: rgba(255,255,255,0.14);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: var(--bg-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Ambient background orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: drift 12s ease-in-out infinite; }
    .orb-1 { width: 550px; height: 550px; top: -200px; left: -150px; background: radial-gradient(circle, rgba(108,99,255,0.35) 0%, transparent 70%); animation-duration: 10s; }
    .orb-2 { width: 400px; height: 400px; bottom: -150px; right: -100px; background: radial-gradient(circle, rgba(56,189,248,0.25) 0%, transparent 70%); animation-direction: reverse; animation-duration: 14s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -40px) scale(1.05); }
    }

    .login-wrapper { width: 100%; max-width: 480px; position: relative; z-index: 1; }

    .brand { text-align: center; margin-bottom: 24px; animation: fadeDown 0.7s ease-out both; }
    .brand-icon {
      width: 55px; height: 55px; background: linear-gradient(135deg, var(--accent), var(--sky));
      border-radius: 16px; display: inline-flex; align-items: center; justify-content: center;
      font-size: 24px; margin-bottom: 12px;
    }
    .brand h1 { font-size: 1.4rem; font-weight: 700; color: var(--text); }

    .card {
      background: var(--card-bg); backdrop-filter: blur(28px); border: 1px solid var(--card-border);
      border-radius: 26px; padding: 40px 36px; box-shadow: 0 30px 60px rgba(0,0,0,0.45);
      animation: fadeUp 0.7s ease-out both;
    }
    .card-title { font-size: 1.6rem; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .card-sub { font-size: 0.875rem; color: var(--text-muted); margin-top: 5px; margin-bottom: 24px; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }

    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 16px; opacity: 0.55; }
    
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; padding: 12px 16px 12px 42px; background: var(--input-bg);
      border: 1.5px solid var(--input-border); border-radius: 12px; color: var(--text);
      font-size: 0.95rem; font-family: 'Inter', sans-serif; transition: all 0.25s; outline: none;
    }
    input::placeholder { color: rgba(255,255,255,0.28); }
    input:focus { border-color: var(--accent-light); background: rgba(108,99,255,0.12); box-shadow: 0 0 0 3px rgba(108,99,255,0.2); }

    .btn-submit {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: var(--text); border: none; border-radius: 12px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(108,99,255,0.55); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.75s linear infinite; display: none; }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert { display: none; border-radius: 12px; padding: 12px 16px; margin-top: 16px; font-size: 0.85rem; text-align: center; }
    .alert.show { display: block; animation: shake 0.4s ease; }
    .alert-error { background: rgba(239,68,68,0.14); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-success { background: rgba(34,197,94,0.14); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

    .footer-link { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
    .footer-link a { color: var(--accent-light); text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-icon">🧠</div>
      <h1>AI Learning Platform</h1>
    </div>

    <div class="card">
      <h2 class="card-title">Create an Account</h2>
      <p class="card-sub">Join us to personalize your learning journey</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="name" placeholder="John Doe" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">📧</span>
            <input type="email" id="email" placeholder="john@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔐</span>
            <input type="password" id="password" placeholder="Create a password" required>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon">✅</span>
            <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
          </div>
        </div>

        <button class="btn-submit" id="submitBtn" type="button">
          <div class="spinner"></div>
          <span class="btn-text">Register Account &nbsp;→</span>
        </button>

        <div class="alert alert-error" id="errorMsg"></div>
        <div class="alert alert-success" id="successMsg"></div>
      </form>

      <div class="footer-link">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    const BACKEND = 'http://localhost:8080';

    document.getElementById('submitBtn').addEventListener('click', doRegister);

    // Allow enter to submit
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doRegister();
      });
    });

    async function doRegister() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');

      hideAlerts();

      if (!name || !email || !password || !confirmPassword) {
        showError('⚠️ All fields are required.');
        return;
      }
      
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showError('⚠️ Please enter a valid email address.');
        return;
      }

      if (password !== confirmPassword) {
        showError('⚠️ Passwords do not match.');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch(`${BACKEND}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (data.success) {
          showSuccess('🎉 ' + data.message);
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
          showError('❌ ' + (data.message || 'Registration failed.'));
        }

      } catch (err) {
        showError('⚠️ Cannot reach the server. Make sure the Java backend is running.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.classList.add('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg; el.classList.add('show');
    }

    function hideAlerts() {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('successMsg').classList.remove('show');
    }
  </script>
</body>
</html>
