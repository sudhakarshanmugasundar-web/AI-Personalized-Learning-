<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth | AI Personalized Learning</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0c; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 20px; }
    
    .orb { position: absolute; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.5; }
    .orb-1 { width: 400px; height: 400px; background: #8b5cf6; top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: #3b82f6; bottom: -50px; right: -50px; }

    .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 32px; width: 100%; max-width: 400px; text-align: center; }
    
    .toggle-grp { background: rgba(255,255,255,0.05); padding: 5px; border-radius: 12px; display: flex; margin-bottom: 30px; }
    .toggle-btn { flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: 0.3s; color: rgba(255,255,255,0.5); }
    .toggle-btn.active { background: #8b5cf6; color: #fff; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }

    .input-grp { margin-bottom: 20px; text-align: left; }
    .input-grp label { display: block; font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.4); margin-bottom: 8px; text-transform: uppercase; }
    input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 14px 18px; border-radius: 12px; color: #fff; font-size: 1rem; outline: none; transition: 0.3s; }
    input:focus { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.05); }

    #nameField { display: none; }
    
    button { width: 100%; background: #8b5cf6; color: #fff; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }

    #msg { margin-top: 20px; font-size: 0.9rem; font-weight: 600; display: none; padding: 12px; border-radius: 10px; }
    .err { background: rgba(239, 68, 68, 0.1); color: #f87171; }
    .succ { background: rgba(34, 197, 94, 0.1); color: #4ade80; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <h1 style="font-size: 1.8rem; margin-bottom: 24px; letter-spacing: -1px;">AI Academy</h1>
    
    <div class="toggle-grp">
      <div id="loginToggle" class="toggle-btn active" onclick="setMode('login')">Login</div>
      <div id="regToggle" class="toggle-btn" onclick="setMode('register')">Register</div>
    </div>

    <div class="input-grp" id="nameField">
      <label>Full Name</label>
      <input type="text" id="nameInput" placeholder="John Doe">
    </div>

    <div class="input-grp">
      <label>Email Address</label>
      <input type="email" id="emailInput" placeholder="john@example.com">
    </div>

    <button id="authBtn">Enter Pathway</button>
    <div id="msg"></div>
  </div>

  <script src="utils.js"></script>
  <script>
    let mode = 'login';
    
    function setMode(m) {
      mode = m;
      document.getElementById('loginToggle').classList.toggle('active', mode === 'login');
      document.getElementById('regToggle').classList.toggle('active', mode === 'register');
      document.getElementById('nameField').style.display = mode === 'register' ? 'block' : 'none';
      document.getElementById('authBtn').innerText = mode === 'register' ? 'Create Account' : 'Enter Pathway';
      document.getElementById('msg').style.display = 'none';
    }

    document.getElementById('authBtn').onclick = async () => {
      const email = document.getElementById('emailInput').value.trim();
      const name = document.getElementById('nameInput').value.trim();
      const msg = document.getElementById('msg');
      
      if (!email || !email.includes('@')) return showErr('Enter a valid email');
      if (mode === 'register' && !name) return showErr('Enter your full name');

      try {
        const endpoint = mode === 'login' ? '/login' : '/register';
        const body = mode === 'login' ? { email } : { email, name };
        
        const res = await window.aiFetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        
        if (!res.ok) return showErr(data.message || 'Error occurred');

        // Success logic
        localStorage.setItem('user', JSON.stringify(data.user));
        msg.innerText = mode === 'login' ? 'Welcome back! Redirecting...' : 'Account created! Redirecting...';
        msg.className = 'succ';
        msg.style.display = 'block';

        setTimeout(() => window.location.href = 'profile.html', 1500);

      } catch (e) {
        showErr('Backend connection lost. Try again later.');
      }
    };

    function showErr(t) {
      const msg = document.getElementById('msg');
      msg.innerText = t;
      msg.className = 'err';
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
